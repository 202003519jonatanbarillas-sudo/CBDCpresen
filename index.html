	.titulo-superior {
	  position: absolute;

	  font-size: 55px;
	  color: white;

	  text-shadow: 0 0 15px rgba(0,0,0,0.7);

	  word-spacing: 3px;
	  text-align: left;

	  text-wrap: balance;

	  z-index: 2;
	}

      color: white;
